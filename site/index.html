<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>memory — docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Persistent cognitive layer for AI systems. Local-first, provider-neutral memory.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #4ade80;
      --sidebar-width: 280px;
      --sidebar-background: #0d0d1a;
      --base-background-color: #08080f;
      --base-font-size: 15px;
      --base-line-height: 1.7;
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono-font-family: 'JetBrains Mono', 'Fira Code', monospace;
      --code-background: #0d0d1a;
      --code-border-radius: 6px;
      --cover-background-color: #08080f;
      --sidebar-nav-link-color: #8888aa;
      --sidebar-nav-link-color--active: #4ade80;
      --sidebar-nav-link-border-color--active: #4ade80;
      --heading-color: #e8e8f0;
    }

    body { background: #08080f; }

    .sidebar {
      border-right: 1px solid #1c1c32 !important;
    }

    .sidebar-nav > ul > li > a {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #44445a !important;
      font-weight: 600;
      cursor: default;
      pointer-events: none;
      margin-top: 1.5rem;
      display: block;
    }

    .sidebar .app-name a {
      color: #4ade80 !important;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .content code {
      color: #4ade80;
      background: #0d0d1a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
    }

    .content pre code {
      color: #c8c8e0;
    }

    h1, h2, h3 {
      letter-spacing: -0.02em;
    }

    /* Cover page */
    section.cover .cover-main > p:first-child {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #4ade80;
    }

    .docsify-copy-code-button {
      background: #1c1c32 !important;
      color: #8888aa !important;
    }

    /* Badge style for aside notes */
    blockquote {
      border-left: 3px solid #4ade80;
      background: #0d0d1a;
      padding: 0.8rem 1rem;
      border-radius: 0 6px 6px 0;
      color: #8888aa;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'memory',
      repo: 'https://github.com/Sakaax/memory',
      homepage: 'home.md',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 2,
      auto2top: true,
      coverpage: false,
      search: {
        placeholder: 'Search docs…',
        noData: 'No results.',
      },
      copyCode: {
        buttonText: 'copy',
        successText: '✓',
      },
      themeColor: '#4ade80',
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
